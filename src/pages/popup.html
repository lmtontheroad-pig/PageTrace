<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>关键词高亮</title>
    <link rel="stylesheet" href="../styles/extension.css">
  </head>
  <body class="kw-extension-page kw-popup-page">
    <main class="kw-popup-shell">
      <header class="kw-popup-header">
        <div>
          <h1>关键词高亮</h1>
          <p id="page-status">读取当前页面状态...</p>
        </div>
        <strong id="total-count" class="kw-total-count">0</strong>
      </header>

      <div class="kw-popup-actions">
        <button id="enable-button" class="kw-button" type="button">启用</button>
        <button id="pause-button" class="kw-button kw-button-secondary" type="button">暂停</button>
        <button id="rescan-button" class="kw-button kw-button-secondary" type="button">重新扫描</button>
      </div>

      <section class="kw-popup-panel">
        <div id="keyword-counts" class="kw-count-list"></div>
      </section>
    </main>

    <script src="../common/shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
